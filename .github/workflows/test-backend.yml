name: Test Backend

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'requirements.txt'
      - '.github/workflows/test-backend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'requirements.txt'

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true
      
      - name: Check code format with black
        run: |
          pip install black
          black --check backend/app --diff
        continue-on-error: true
      
      - name: Health check - Import modules
        run: |
          python -c "from backend.app.main import app; print('✓ Backend imports successfully')"
          python -c "from backend.app.services.csv_service import analyze_sales; print('✓ CSV service imports successfully')"
          python -c "from backend.app.services.llm_service import generate_summary; print('✓ LLM service imports successfully')"
          python -c "from backend.app.services.email_service import send_email; print('✓ Email service imports successfully')"
      
      - name: Generate coverage report
        run: |
          pytest backend --cov=backend/app --cov-report=term --cov-report=xml || true
        continue-on-error: true
